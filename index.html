<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GEXF Graph Viewer</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sigma.js/2.4.0/sigma.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/graphology/0.25.4/graphology.umd.min.js"></script>
    <script src="scripts/GexfParser.js" type="module"></script>
    <script src="scripts/GraphViewer.js" type="module"></script>
  </head>
  <body>
    <div class="controls">
      <button id="load-file">Load New File</button>
      <input type="file" id="file-input" accept=".gexf" style="display: none;" />
      <button id="start-layout">Start</button>
      <label>Max Itr: <input type="number" id="max-iterations" min="10" max="5000" step="10" value="600" /></label>
      <label><input type="checkbox" id="remove-isolated" /> Remove isolated nodes</label>
      <button id="zoom-in">+</button>
      <button id="zoom-out">-</button>
      <!-- <button id="zoom-reset">Reset Zoom</button> -->
      <button id="theme-toggle" title="Toggle Dark/Light Mode">🌙</button>
      <span id="iteration-counter">No file loaded</span>
    </div>
    <div id="tooltip"></div>
    <div id="sigma-container"></div>
    
    <script type="module">
      import GraphViewer from './scripts/GraphViewer.js';
      
      const viewer = new GraphViewer();
      // Don't auto-load - wait for user to select a file
    </script>
  </body>
</html>
